<!DOCTYPE html>
<html>
<head>
<title>Watch Time Panel</title>
<style>
body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
padding:40px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
width:300px;
margin:auto;
box-shadow:0px 0px 10px #ccc;
}

input,select,button{
width:90%;
padding:10px;
margin:10px;
}

button{
background:#28a745;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#218838;
}
</style>
</head>

<body>

<div class="box">

<h2>Send Watch Time</h2>

<form action="order.php" method="POST">

<input type="text" name="link" placeholder="Video Link" required>

<select name="watchtime">
<option value="30">30 Seconds</option>
<option value="60">1 Minute</option>
<option value="120">2 Minutes</option>
<option value="300">5 Minutes</option>
</select>

<input type="number" name="amount" placeholder="Views Amount">

<button type="submit">Start Watch Time</button>

</form>

</div>

</body>
</html>
